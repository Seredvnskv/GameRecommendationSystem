version: '3.8'

services:
  backend:
    build: ./Backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network

  frontend:
    build: ./Frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge